name: Borrado puntual de productos

on:
  workflow_dispatch: {}   # SOLO se ejecuta a mano, nunca automáticamente

jobs:
  borrar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Eliminar productos de Shopify
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: python borrar_puntual.py
