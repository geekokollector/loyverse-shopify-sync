name: Sync Loyverse → Shopify

on:
  schedule:
    - cron: "4,14,24,34,44,54 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Ejecutar sincronización
        env:
          LOYVERSE_TOKEN: ${{ secrets.LOYVERSE_TOKEN }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          LOYVERSE_STORE_ID: ${{ secrets.LOYVERSE_STORE_ID }}
          LOYVERSE_CATEGORIES: "geeko"
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          SAFETY_BUFFER: "0"
          CREATE_DRAFTS: "true"
          IMAGE_BUDGET: "8"
        run: python sync.py

      - name: Subir lista de no encontrados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: no_encontrados
          path: no_encontrados.csv
          if-no-files-found: ignore
