name: Sync Loyverse → Shopify

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Ejecutar sincronización
        env:
          LOYVERSE_TOKEN: ${{ secrets.LOYVERSE_TOKEN }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          LOYVERSE_STORE_ID: ${{ secrets.LOYVERSE_STORE_ID }}
          LOYVERSE_CATEGORIES: "geeko"
          SAFETY_BUFFER: "0"
          CREATE_DRAFTS: "false"
        run: python sync.py
